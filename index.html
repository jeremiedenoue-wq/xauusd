<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- FIX CACHE GITHUB -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>XAU/USD · Live Brief</title>

<style>
/* (TON CSS INCHANGÉ — je ne le répète pas pour lisibilité) */
</style>
</head>

<body>
<div id="app">
<!-- (TON HTML INCHANGÉ — garde exactement le tien) -->
</div>

<script>
// ══════════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════════
const CFG = {
  PRICE_INTERVAL : 15 * 60 * 1000,
  NEWS_INTERVAL  : 15 * 60 * 1000,
  CAL_INTERVAL   : 60 * 60 * 1000,
  PROXY          : "https://corsproxy.io/?", // FIX PROXY
  HISTORY_KEY    : "xau_brief_v3",
  MAX_HISTORY    : 20,
};

// LOG ERREURS SILENCIEUSES
window.addEventListener("unhandledrejection", e => {
  console.error("Unhandled promise:", e.reason);
});

// ══════════════════════════════════════════════════════════════
// ÉTAT
// ══════════════════════════════════════════════════════════════
let STATE = {
  prices   : {},
  news     : [],
  calendar : [],
  history  : [],
  lastPrice: null,
  lastNews : null,
  lastCal  : null,
  pCd: CFG.PRICE_INTERVAL/1000,
  nCd: CFG.NEWS_INTERVAL/1000,
  cCd: CFG.CAL_INTERVAL/1000,
};

// ══════════════════════════════════════════════════════════════
// FETCH YAHOO (CORRIGÉ)
// ══════════════════════════════════════════════════════════════
const YF_SYMS = { xau:"GC=F", xag:"SI=F", dxy:"DX=F", tnx:"^TNX", spx:"^GSPC" };

async function fetchYahoo(sym) {
  try {
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1m&range=1d`;

    const r = await fetch(CFG.PROXY + url);
    const txt = await r.text();
    const data = JSON.parse(txt);

    const meta = data?.chart?.result?.[0]?.meta;
    if (!meta) return null;

    const price = meta.regularMarketPrice;
    const prev  = meta.previousClose || meta.chartPreviousClose;

    const chg = prev ? +((price - prev) / prev * 100).toFixed(3) : 0;

    return { price, chg, dir: chg >= 0 ? "up" : "dn" };

  } catch (e) {
    console.error("Yahoo error:", e);
    return null;
  }
}

async function loadPrices() {
  const keys = Object.keys(YF_SYMS);
  const vals = await Promise.all(Object.values(YF_SYMS).map(fetchYahoo));

  keys.forEach((k, i) => {
    if (vals[i]) STATE.prices[k] = vals[i];
  });

  STATE.lastPrice = new Date();
  STATE.pCd = CFG.PRICE_INTERVAL / 1000; // FIX RESET

  renderTickers();
  computeBias();
}

// ══════════════════════════════════════════════════════════════
// CALENDRIER FIX
// ══════════════════════════════════════════════════════════════
async function loadCalendar() {
  try {
    const url = "https://nfs.faireconomy.media/ff_calendar_thisweek.json";

    const r = await fetch(CFG.PROXY + url);
    const txt = await r.text();
    const raw = JSON.parse(txt);

    const today = new Date().toISOString().slice(0, 10);

    STATE.calendar = raw
      .filter(e => e.date?.startsWith(today))
      .slice(0, 14)
      .map(e => ({
        heure: new Date(e.date).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}),
        event: e.title,
        pays: (e.country || "").toUpperCase(),
        impact: e.impact || "LOW",
        precedent: e.previous || "—",
        consensus: e.forecast || "—",
        actual: e.actual || null,
      }));

    STATE.lastCal = new Date();
    STATE.cCd = CFG.CAL_INTERVAL / 1000; // FIX

    renderCalendar();
    computeMacroContext();

  } catch (e) {
    console.error(e);
  }
}

// ══════════════════════════════════════════════════════════════
// NEWS FIX
// ══════════════════════════════════════════════════════════════
const RSS_FEEDS = [
  "https://www.kitco.com/rss/ListingsRSS.aspx?ID=3",
];

async function fetchRSS(url) {
  try {
    const api = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&count=20`;

    const r = await fetch(CFG.PROXY + api);
    const txt = await r.text();
    const d = JSON.parse(txt);

    if (!d || d.status !== "ok" || !d.items) return [];

    return d.items.map(item => ({
      titre: item.title,
      desc: item.description?.replace(/<[^>]*>/g,"").slice(0,200),
      url: item.link,
      date: item.pubDate,
    }));

  } catch (e) {
    console.error("RSS error:", e);
    return [];
  }
}

async function loadNews() {
  const res = await Promise.all(RSS_FEEDS.map(fetchRSS));

  STATE.news = res.flat().slice(0, 10);
  STATE.lastNews = new Date();
  STATE.nCd = CFG.NEWS_INTERVAL / 1000; // FIX

  renderNews();
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
(async function init() {
  await Promise.all([
    loadPrices(),
    loadNews(),
    loadCalendar()
  ]);

  setInterval(loadPrices, CFG.PRICE_INTERVAL);
  setInterval(loadNews, CFG.NEWS_INTERVAL);
  setInterval(loadCalendar, CFG.CAL_INTERVAL);

  setInterval(() => {
    STATE.pCd--;
    STATE.nCd--;
    STATE.cCd--;
    updateHeader();
  }, 1000);
})();
</script>
</body>
</html>
